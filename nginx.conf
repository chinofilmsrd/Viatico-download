events {}
http {
    server {
        listen 80;
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }
        location /info {
            proxy_pass http://127.0.0.1:5001;
        }
        location /download {
            proxy_pass http://127.0.0.1:5001;
        }
        location /health {
            proxy_pass http://127.0.0.1:5001;
        }
    }
}