<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Viáticos ·  Downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #0b0e14; --bg-surface: rgba(20, 28, 40, 0.7); --bg-card: rgba(15, 22, 36, 0.75);
      --accent: #3b82f6; --accent-glow: #2563eb; --success: #10b981; --danger: #ef4444;
      --text-primary: #f1f5f9; --text-secondary: #94a3b8; --border-light: rgba(255, 255, 255, 0.08);
      --shadow-lg: 0 20px 35px -8px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.02);
      --glass-blur: blur(16px) saturate(180%); --transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
    }
    body {
      font-family: 'Inter', sans-serif; background: var(--bg-primary);
      background-image: radial-gradient(circle at 20% 30%, rgba(59, 130, 246, 0.12) 0%, transparent 35%),
                        radial-gradient(circle at 80% 70%, rgba(16, 185, 129, 0.08) 0%, transparent 40%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem;
      color: var(--text-primary); -webkit-font-smoothing: antialiased;
    }
    .app-container {
      max-width: 820px; width: 100%; background: var(--bg-card); backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur); border-radius: 2.5rem; padding: 2.25rem;
      box-shadow: var(--shadow-lg); border: 1px solid var(--border-light); transition: var(--transition);
    }
    .app-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 2rem; }
    .logo-icon { font-size: 2.2rem; color: var(--accent); filter: drop-shadow(0 0 12px rgba(59, 130, 246, 0.5)); }
    h1 { font-weight: 600; font-size: 1.9rem; letter-spacing: -0.02em; background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 90%); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .badge-nasa { margin-left: auto; background: rgba(255, 255, 255, 0.05); padding: 0.3rem 1rem; border-radius: 40px; font-size: 0.8rem; font-weight: 500; border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(4px); color: #a5b4fc; }
    .url-input-wrapper {
      display: flex; align-items: center; background: rgba(0, 0, 0, 0.25); border-radius: 3rem;
      padding: 0.25rem 0.25rem 0.25rem 1.5rem; border: 1px solid var(--border-light);
      backdrop-filter: blur(8px); margin-bottom: 1.5rem; transition: var(--transition);
    }
    .url-input-wrapper:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
    .url-input-wrapper i { color: var(--text-secondary); font-size: 1.2rem; }
    #urlInput {
      flex: 1; background: transparent; border: none; padding: 1rem 1rem; font-size: 1rem;
      color: var(--text-primary); outline: none; font-weight: 400;
    }
    #urlInput::placeholder { color: var(--text-secondary); opacity: 0.7; }
    .format-selector { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .format-btn {
      background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-light); color: var(--text-secondary);
      padding: 0.7rem 1.5rem; border-radius: 40px; font-weight: 500; font-size: 1rem;
      display: flex; align-items: center; gap: 0.5rem; cursor: pointer; backdrop-filter: blur(8px);
      transition: var(--transition);
    }
    .format-btn i { font-size: 1.1rem; }
    .format-btn.active { background: var(--accent); border-color: var(--accent); color: white; box-shadow: 0 8px 20px -8px rgba(59, 130, 246, 0.5); }
    .quality-wrapper { display: flex; align-items: center; gap: 0.8rem; margin-left: auto; }
    .quality-select {
      background: rgba(0, 0, 0, 0.3); border: 1px solid var(--border-light); color: var(--text-primary);
      padding: 0.6rem 1.2rem; border-radius: 40px; font-size: 0.95rem; backdrop-filter: blur(8px);
      cursor: pointer; outline: none;
    }
    .fetch-btn {
      background: linear-gradient(145deg, var(--accent), var(--accent-glow)); border: none; color: white;
      font-weight: 600; padding: 1rem 2.2rem; border-radius: 3rem; font-size: 1.1rem;
      display: inline-flex; align-items: center; gap: 0.75rem; cursor: pointer;
      box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4); transition: var(--transition);
      border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; justify-content: center; margin-top: 0.5rem;
    }
    .fetch-btn:hover { transform: scale(1.01); box-shadow: 0 15px 25px -6px #2563eb80; background: linear-gradient(145deg, #2563eb, #1d4ed8); }
    .fetch-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
    .loader { display: inline-block; width: 1.3rem; height: 1.3rem; border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; border-top-color: white; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .results-section { margin-top: 2rem; opacity: 0; transform: translateY(10px); transition: opacity 0.4s ease, transform 0.4s ease; }
    .results-section.show { opacity: 1; transform: translateY(0); }
    .video-preview {
      display: flex; gap: 1.5rem; background: rgba(0, 0, 0, 0.2); border-radius: 1.8rem; padding: 1.5rem;
      margin-bottom: 1.8rem; border: 1px solid var(--border-light); backdrop-filter: blur(4px); align-items: center;
    }
    .thumbnail { width: 140px; height: 80px; border-radius: 14px; object-fit: cover; background: #1e293b; border: 1px solid rgba(255,255,255,0.05); }
    .video-info h3 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.3rem; }
    .video-meta { color: var(--text-secondary); font-size: 0.9rem; }
    .format-list { display: flex; flex-direction: column; gap: 0.8rem; }
    .format-item {
      display: flex; align-items: center; justify-content: space-between; background: rgba(255, 255, 255, 0.02);
      padding: 0.9rem 1.5rem; border-radius: 2rem; border: 1px solid var(--border-light); backdrop-filter: blur(4px);
    }
    .format-detail { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .quality-badge { background: var(--accent); padding: 0.25rem 0.9rem; border-radius: 30px; font-size: 0.8rem; font-weight: 600; color: white; }
    .mp3-badge { background: var(--success); }
    .download-btn {
      background: transparent; border: 1.5px solid var(--accent); color: var(--accent); padding: 0.5rem 1.4rem;
      border-radius: 40px; font-weight: 500; cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; gap: 0.5rem; position: relative; overflow: hidden;
    }
    .download-btn:hover { background: var(--accent); color: white; box-shadow: 0 0 15px var(--accent-glow); }
    .download-btn:disabled { opacity: 0.7; cursor: not-allowed; }
    
    /* Estilos para la barra de progreso */
    .progress-container {
      margin-top: 1rem; display: none; flex-direction: column; gap: 0.5rem;
    }
    .progress-bar-wrapper {
      width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 20px; overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--success));
      border-radius: 20px; transition: width 0.3s ease;
    }
    .progress-text {
      display: flex; justify-content: space-between; color: var(--text-secondary); font-size: 0.8rem;
    }
    .error-message { color: var(--danger); text-align: center; margin-top: 1rem; font-weight: 500; }
    .footer-note { margin-top: 2rem; text-align: center; font-size: 0.8rem; color: var(--text-secondary); opacity: 0.7; }
    @media (max-width: 600px) {
      .app-container { padding: 1.5rem; }
      h1 { font-size: 1.5rem; }
      .video-preview { flex-direction: column; align-items: flex-start; }
      .format-selector { flex-direction: column; }
      .quality-wrapper { margin-left: 0; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="app-header">
    <i class="fas fa-cloud-arrow-down logo-icon"></i>
    <h1>Viáticos - Download</h1>
    <span class="badge-nasa"><i class="fas fa-satellite"></i> By Coffee</span>
  </div>

  <div class="url-input-wrapper">
    <i class="fab fa-youtube"></i>
    <input type="text" id="urlInput" placeholder="Pega el enlace de YouTube aquí (se analiza automáticamente)">
  </div>

  <div class="format-selector">
    <div style="display: flex; gap: 0.75rem;">
      <div class="format-btn active" data-format="video"><i class="fas fa-video"></i> Video</div>
      <div class="format-btn" data-format="mp3"><i class="fas fa-music"></i> MP3</div>
    </div>
    <div class="quality-wrapper" id="qualityWrapper">
      <i class="fas fa-arrow-down-wide-short" style="color: var(--text-secondary);"></i>
      <select id="qualitySelect" class="quality-select">
        <option value="original">Original (máx.)</option>
        <option value="1080p">1080p</option>
        <option value="720p" selected>720p (mín.)</option>
      </select>
    </div>
  </div>

  <button class="fetch-btn" id="fetchBtn"><i class="fas fa-magnifying-glass"></i> Analizar enlace</button>

  <div id="loadingIndicator" style="text-align: center; margin-top: 1rem; display: none;">
    <span class="loader"></span> <span style="margin-left: 0.5rem; color: var(--text-secondary);">Analizando video...</span>
  </div>

  <!-- Contenedor de barra de progreso global (se inserta dinámicamente al descargar) -->
  <div id="progressContainer" class="progress-container">
    <div class="progress-bar-wrapper">
      <div id="progressBarFill" class="progress-bar-fill" style="width: 0%;"></div>
    </div>
    <div class="progress-text">
      <span id="progressStatus">Preparando descarga...</span>
      <span id="progressPercent">0%</span>
    </div>
  </div>

  <div id="results" class="results-section"></div>
  <div class="footer-note">
    <i class="far fa-shield"></i> Calidad mínima 720p · Descarga con progreso en tiempo real
  </div>
</div>

<script>
  (function(){
    "use strict";

    const API_BASE = 'eliezerpro.pythonanywhere.com';  // Ajusta al puerto de tu backend

    // Elementos DOM
    const urlInput = document.getElementById('urlInput');
    const fetchBtn = document.getElementById('fetchBtn');
    const formatBtns = document.querySelectorAll('.format-btn');
    const qualitySelect = document.getElementById('qualitySelect');
    const qualityWrapper = document.getElementById('qualityWrapper');
    const resultsDiv = document.getElementById('results');
    const loadingIndicator = document.getElementById('loadingIndicator');
    const progressContainer = document.getElementById('progressContainer');
    const progressBarFill = document.getElementById('progressBarFill');
    const progressStatus = document.getElementById('progressStatus');
    const progressPercent = document.getElementById('progressPercent');

    let currentFormat = 'video';
    let currentQuality = '720p';
    let currentVideoInfo = null;
    let analysisTimeout = null;
    let progressInterval = null;

    // Utilidades
    function isValidYoutubeUrl(url) {
      return /^(https?:\/\/)?(www\.)?(youtube\.com|youtu\.?be)\/.+$/.test(url);
    }

    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.style.cssText = 'position:fixed;bottom:2rem;right:2rem;padding:1rem 2rem;border-radius:60px;background:#0f172a;color:white;backdrop-filter:blur(12px);border:1px solid #3b82f6;box-shadow:0 10px 25px -5px #00000080;z-index:9999;font-weight:500;';
      toast.innerHTML = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 4000);
    }

    // Control de progreso simulado (hasta que el backend responda)
    function startProgressSimulation() {
      let progress = 0;
      progressContainer.style.display = 'flex';
      progressBarFill.style.width = '0%';
      progressPercent.textContent = '0%';
      progressStatus.textContent = 'Conectando con el servidor...';

      progressInterval = setInterval(() => {
        if (progress < 90) {
          // Aceleración realista: avanza más lento al principio y al final
          const increment = Math.random() * 15 + 5;
          progress = Math.min(progress + increment, 90);
          progressBarFill.style.width = progress + '%';
          progressPercent.textContent = Math.floor(progress) + '%';
          
          if (progress < 30) progressStatus.textContent = 'Obteniendo información del video...';
          else if (progress < 60) progressStatus.textContent = 'Descargando fragmentos de video...';
          else if (progress < 90) progressStatus.textContent = 'Procesando y combinando formatos...';
        }
      }, 800);
    }

    function completeProgress() {
      clearInterval(progressInterval);
      progressBarFill.style.width = '100%';
      progressPercent.textContent = '100%';
      progressStatus.textContent = '¡Descarga completada! Guardando archivo...';
      setTimeout(() => {
        progressContainer.style.display = 'none';
      }, 1500);
    }

    function resetProgress() {
      clearInterval(progressInterval);
      progressContainer.style.display = 'none';
      progressBarFill.style.width = '0%';
    }

    // Cambiar formato
    formatBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        formatBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFormat = btn.dataset.format;
        qualityWrapper.style.display = currentFormat === 'video' ? 'flex' : 'none';
        if (currentVideoInfo) renderResults(currentVideoInfo);
      });
    });

    qualitySelect.addEventListener('change', (e) => {
      currentQuality = e.target.value;
      if (currentVideoInfo) renderResults(currentVideoInfo);
    });

    // Obtener información del video (con timeout)
    async function fetchVideoInfo(url) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 15000);
      try {
        const response = await fetch(`${API_BASE}/info`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url }),
          signal: controller.signal
        });
        clearTimeout(timeoutId);
        if (!response.ok) throw new Error((await response.json()).error || 'Error del servidor');
        return await response.json();
      } catch (error) {
        if (error.name === 'AbortError') throw new Error('Tiempo de espera agotado. ¿Backend activo?');
        throw error;
      }
    }

    // Análisis automático con debounce
    function triggerAnalysis() {
      const url = urlInput.value.trim();
      if (!isValidYoutubeUrl(url)) {
        resultsDiv.innerHTML = '';
        resultsDiv.classList.remove('show');
        return;
      }
      if (analysisTimeout) clearTimeout(analysisTimeout);
      analysisTimeout = setTimeout(async () => {
        loadingIndicator.style.display = 'block';
        fetchBtn.disabled = true;
        resultsDiv.classList.remove('show');
        resultsDiv.innerHTML = '';
        try {
          const info = await fetchVideoInfo(url);
          currentVideoInfo = info;
          renderResults(info);
        } catch (error) {
          resultsDiv.innerHTML = `<div class="error-message"><i class="fas fa-exclamation-triangle"></i> ${error.message}</div>`;
          resultsDiv.classList.add('show');
        } finally {
          loadingIndicator.style.display = 'none';
          fetchBtn.disabled = false;
          analysisTimeout = null;
        }
      }, 500);
    }

    urlInput.addEventListener('input', triggerAnalysis);
    urlInput.addEventListener('paste', () => setTimeout(triggerAnalysis, 100));
    fetchBtn.addEventListener('click', () => {
      if (analysisTimeout) clearTimeout(analysisTimeout);
      triggerAnalysis();
    });
    urlInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        if (analysisTimeout) clearTimeout(analysisTimeout);
        triggerAnalysis();
      }
    });

    // Descarga real con barra de progreso
    async function performRealDownload(formatType, quality, videoTitle) {
      const url = urlInput.value.trim();
      startProgressSimulation();

      try {
        const response = await fetch(`${API_BASE}/download`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, format: formatType, quality })
        });

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.error || 'Error en el servidor');
        }

        // Al recibir respuesta, llevamos la barra a 100%
        completeProgress();

        const blob = await response.blob();
        const downloadUrl = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = downloadUrl;
        const extension = formatType === 'video' ? 'mp4' : 'mp3';
        a.download = `${(videoTitle || 'video').replace(/[^\w\s]/gi, '_')}.${extension}`;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(downloadUrl);
        document.body.removeChild(a);

        showToast(`✅ Descarga completada: ${a.download}`, 'success');
        return true;
      } catch (error) {
        resetProgress();
        console.error(error);
        showToast(`❌ ${error.message}`, 'error');
        return false;
      }
    }

    function renderResults(info) {
      if (!info) return;

      const formatType = currentFormat;
      let formats = [];
      if (formatType === 'video') {
        formats = [
          { quality: 'Original (máx.)', label: 'Máxima calidad', size: 'Variable', itag: 'original' },
          { quality: '1080p', label: '1080p · Full HD', size: '~500-800 MB', itag: '1080p' },
          { quality: '720p', label: '720p · HD (mínimo)', size: '~300-500 MB', itag: '720p' }
        ];
      } else {
        formats = [
          { quality: 'MP3 320kbps', label: 'Alta calidad · 320 kbps', size: '~10-15 MB', itag: 'mp3_320' },
          { quality: 'MP3 128kbps', label: 'Estándar · 128 kbps', size: '~4-6 MB', itag: 'mp3_128' }
        ];
      }

      let formatsHtml = '';
      formats.forEach((fmt, idx) => {
        const isRecommended = (formatType === 'video' && fmt.itag === currentQuality) || (formatType === 'mp3' && idx === 0);
        formatsHtml += `
          <div class="format-item">
            <div class="format-detail">
              <span class="quality-badge ${formatType === 'mp3' ? 'mp3-badge' : ''}">${fmt.quality}</span>
              <span style="color: var(--text-secondary);">${fmt.label} · ${fmt.size}</span>
              ${isRecommended ? '<i class="fas fa-star" style="color: #fbbf24; margin-left: 0.5rem;"></i>' : ''}
            </div>
            <button class="download-btn" data-itag="${fmt.itag}" data-quality="${fmt.quality}">
              <i class="fas fa-download"></i> Descargar
            </button>
          </div>
        `;
      });

      const durationMin = Math.floor((info.duration || 0) / 60);
      const durationSec = Math.floor((info.duration || 0) % 60).toString().padStart(2, '0');
      const durationStr = `${durationMin}:${durationSec}`;

      resultsDiv.innerHTML = `
        <div class="video-preview">
          <img class="thumbnail" src="${info.thumbnail}" alt="thumbnail" onerror="this.src='https://via.placeholder.com/140x80/1e293b/94a3b8?text=YouTube'">
          <div class="video-info">
            <h3>${info.title}</h3>
            <div class="video-meta">
              <i class="far fa-user"></i> ${info.uploader || 'Desconocido'}  ·  <i class="far fa-clock"></i> ${durationStr}
            </div>
          </div>
        </div>
        <div class="format-list">
          ${formatsHtml}
        </div>
        <p style="font-size:0.8rem; margin-top:1rem; color: var(--text-secondary);">
          <i class="fas fa-info-circle"></i> ${formatType === 'video' ? 'Mínimo 720p · Máxima original' : 'Audio de alta fidelidad'}
        </p>
      `;
      resultsDiv.classList.add('show');

      document.querySelectorAll('.download-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.preventDefault();
          const itag = btn.dataset.itag;
          btn.disabled = true;
          const originalHTML = btn.innerHTML;
          btn.innerHTML = '<span class="loader"></span> Preparando...';

          let qualityParam = currentQuality;
          if (currentFormat === 'video') {
            if (itag === 'original') qualityParam = 'original';
            else if (itag === '1080p') qualityParam = '1080p';
            else qualityParam = '720p';
          } else {
            qualityParam = 'mp3';
          }

          await performRealDownload(currentFormat, qualityParam, info.title);
          
          btn.disabled = false;
          btn.innerHTML = originalHTML;
          resetProgress(); // Asegurar que la barra se oculta si hubo error
        });
      });
    }

    qualityWrapper.style.display = 'flex';
  })();
</script>
</body>
</html>
